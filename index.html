<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Teleprompter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --text: #f0ece4;
    --accent: #c8b87a;
    --dim: #3a3a3a;
    --panel: #141414;
    --border: #222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ══ EDITOR ══ */
  #editor-screen {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 1.25rem;
    padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
    gap: 1rem;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding-top: env(safe-area-inset-top, 0px);
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .divider-h { flex: 1; height: 1px; background: var(--border); }

  textarea {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    line-height: 1.7;
    padding: 1rem;
    resize: none;
    outline: none;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }

  textarea::placeholder { color: #444; }
  textarea:focus { border-color: var(--accent); }

  /* Mobile: 2-col grid */
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .control-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    color: #666;
    text-transform: uppercase;
  }

  .slider-row { display: flex; align-items: center; gap: 0.5rem; }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: var(--dim);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 50%;
  }

  .value-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    min-width: 2.2rem;
    text-align: right;
  }

  .toggle-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: #666;
    padding: 0.5rem 1rem;
    min-height: 44px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    align-self: flex-end;
  }

  .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

  .start-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    height: 52px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
    grid-column: span 2;
    width: 100%;
  }

  .start-btn:active { opacity: 0.8; }

  /* ══ PROMPTER ══ */
  #prompter-screen {
    display: none;
    flex-direction: column;
    height: 100dvh;
    position: relative;
    overflow: hidden;
  }

  #prompter-screen::before,
  #prompter-screen::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 130px;
    z-index: 10;
    pointer-events: none;
  }

  #prompter-screen::before { top: 0; background: linear-gradient(to bottom, var(--bg), transparent); }
  #prompter-screen::after  { bottom: 0; background: linear-gradient(to top, var(--bg), transparent); }

  #scroll-container {
    flex: 1;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  #prompt-text {
    padding: 55vh 6vw 55vh;
    line-height: 1.65;
    will-change: transform;
  }

  #prompt-text.mirror { transform: scaleX(-1); }

  .reading-line {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.2;
    z-index: 5;
    pointer-events: none;
    transform: translateY(-50%);
  }

  /* ── PROMPTER BAR ── */
  #prompter-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0.5rem 0.75rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom, 0px));
    gap: 0.4rem;
    z-index: 20;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .bar-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--border);
    color: #888;
    height: 44px;
    min-width: 44px;
    padding: 0 0.6rem;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  .bar-btn:active { border-color: var(--accent); color: var(--accent); }
  .bar-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }
  .bar-btn.grow   { flex: 1; }

  .bar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .bar-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    min-width: 2.2rem;
    text-align: center;
  }

  .bar-spacer { flex: 1; }

  .progress-track {
    flex: 1;
    height: 2px;
    background: var(--dim);
    border-radius: 2px;
    overflow: hidden;
    align-self: center;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    border-radius: 2px;
  }

  /* Swipe hint */
  #swipe-hint {
    position: absolute;
    inset: 0;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    background: rgba(10,10,10,0.82);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  #swipe-hint.show { opacity: 1; }

  .hint-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: #666;
    text-transform: uppercase;
  }
  .hint-line span { color: var(--accent); }

  /* Done overlay */
  #done-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.92);
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  #done-overlay.visible { display: flex; }

  .done-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
  }

  /* ── Desktop: collapse to single row ── */
  @media (min-width: 640px) {
    #editor-screen { padding: 2rem; gap: 1.5rem; }

    .controls-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.5rem;
    }

    .control-group { flex-direction: row; align-items: center; gap: 0.75rem; }

    input[type=range] { flex: none; width: 100px; }

    .start-btn { width: auto; grid-column: unset; padding: 0 2rem; flex: none; }

    #prompter-bar { flex-direction: row; height: 40px; padding: 0 1.5rem; gap: 1rem; }
    .bar-row { display: contents; }
    .bar-btn { height: 26px; font-size: 0.6rem; min-width: unset; padding: 0 0.6rem; }
    .bar-btn.grow { flex: none; }
    #swipe-hint { display: none; }
  }
</style>
</head>
<body>

<!-- ══ EDITOR ══ -->
<div id="editor-screen">
  <div class="header">
    <span class="logo">Teleprompter</span>
    <div class="divider-h"></div>
  </div>

  <textarea id="script-input" placeholder="Indsæt dit manuskript her..."></textarea>

  <div class="controls-grid">

    <div class="control-group">
      <span class="control-label">Hastighed</span>
      <div class="slider-row">
        <input type="range" id="speed-slider" min="1" max="10" value="4" step="0.5">
        <span class="value-display" id="speed-val">4</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Tekststørrelse</span>
      <div class="slider-row">
        <input type="range" id="size-slider" min="20" max="96" value="38" step="2">
        <span class="value-display" id="size-val">38</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Tekstbredde</span>
      <div class="slider-row">
        <input type="range" id="width-slider" min="30" max="100" value="70" step="5">
        <span class="value-display" id="width-val">70%</span>
      </div>
    </div>

    <div class="control-group">
      <span class="control-label">Spejlvend</span>
      <button class="toggle-btn" id="mirror-btn" onclick="toggleMirror()">Fra</button>
    </div>

    <button class="start-btn" onclick="startPrompter()">▶ Start</button>

  </div>
</div>

<!-- ══ PROMPTER ══ -->
<div id="prompter-screen">
  <div id="scroll-container">
    <div class="reading-line"></div>
    <div id="prompt-text"></div>

    <div id="swipe-hint">
      <p class="hint-line"><span>Tryk</span> for at pause / starte</p>
      <p class="hint-line"><span>Stryg op</span> = hurtigere</p>
      <p class="hint-line"><span>Stryg ned</span> = langsommere</p>
    </div>

    <div id="done-overlay">
      <span class="done-text">— Slut —</span>
      <button class="bar-btn" style="height:44px;padding:0 1.5rem;" onclick="resetPrompter()">↩ Tilbage</button>
    </div>
  </div>

  <div id="prompter-bar">
    <div class="bar-row">
      <button class="bar-btn grow active" id="play-btn" onclick="togglePlay()">⏸ Pause</button>
      <button class="bar-btn grow" onclick="resetPrompter()">↩ Editor</button>
      <button class="bar-btn" onclick="toggleFullscreen()">⤢</button>
    </div>

    <div class="bar-row">
      <span class="bar-label">Hast.</span>
      <button class="bar-btn" onclick="changeSpeed(-0.5)">−</button>
      <span class="bar-val" id="bar-speed-val">4</span>
      <button class="bar-btn" onclick="changeSpeed(+0.5)">+</button>

      <span class="bar-label">Tekst</span>
      <button class="bar-btn" onclick="changeSize(-2)">−</button>
      <button class="bar-btn" onclick="changeSize(+2)">+</button>

      <span class="bar-label">Br.</span>
      <button class="bar-btn" onclick="changeWidth(-5)">−</button>
      <span class="bar-val" id="bar-width-val">70%</span>
      <button class="bar-btn" onclick="changeWidth(+5)">+</button>

      <div class="bar-spacer"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let scrollPos   = 0;
  let speed       = 4;
  let fontSize    = 38;
  let textWidth   = 70;
  let mirrored    = false;
  let running     = false;
  let raf         = null;
  let lastTime    = null;
  let totalHeight = 0;

  const speedSlider    = document.getElementById('speed-slider');
  const sizeSlider     = document.getElementById('size-slider');
  const widthSlider    = document.getElementById('width-slider');
  const speedVal       = document.getElementById('speed-val');
  const sizeVal        = document.getElementById('size-val');
  const widthVal       = document.getElementById('width-val');
  const mirrorBtn      = document.getElementById('mirror-btn');
  const promptText     = document.getElementById('prompt-text');
  const playBtn        = document.getElementById('play-btn');
  const barSpeedVal    = document.getElementById('bar-speed-val');
  const barWidthVal    = document.getElementById('bar-width-val');
  const progressFill   = document.getElementById('progress-fill');
  const scrollContainer = document.getElementById('scroll-container');

  speedSlider.addEventListener('input', () => { speed = parseFloat(speedSlider.value); speedVal.textContent = speed; });
  sizeSlider.addEventListener('input',  () => { fontSize = parseInt(sizeSlider.value); sizeVal.textContent = fontSize; });
  widthSlider.addEventListener('input', () => { textWidth = parseInt(widthSlider.value); widthVal.textContent = textWidth + '%'; });

  function toggleMirror() {
    mirrored = !mirrored;
    mirrorBtn.classList.toggle('active', mirrored);
    mirrorBtn.textContent = mirrored ? 'Til' : 'Fra';
  }

  function startPrompter() {
    const text = document.getElementById('script-input').value.trim();
    if (!text) return;

    promptText.style.fontSize = fontSize + 'px';
    promptText.style.width    = textWidth + '%';
    promptText.style.margin   = '0 auto';
    promptText.innerHTML      = text.replace(/\n/g, '<br>');
    if (mirrored) promptText.classList.add('mirror');
    else promptText.classList.remove('mirror');

    scrollPos = 0;
    promptText.style.transform = 'translateY(0px)';
    progressFill.style.width   = '0%';

    document.getElementById('editor-screen').style.display  = 'none';
    document.getElementById('prompter-screen').style.display = 'flex';
    document.getElementById('done-overlay').classList.remove('visible');

    barSpeedVal.textContent = speed;
    barWidthVal.textContent = textWidth + '%';

    // Show gesture hint briefly on mobile
    const hint = document.getElementById('swipe-hint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 2500);

    requestAnimationFrame(() => {
      totalHeight = promptText.scrollHeight - scrollContainer.clientHeight;
      running  = true;
      lastTime = null;
      raf = requestAnimationFrame(tick);
    });
  }

  function tick(ts) {
    if (!running) return;
    if (lastTime === null) lastTime = ts;
    const delta = ts - lastTime;
    lastTime = ts;

    scrollPos += speed * 0.028 * delta;

    if (scrollPos >= totalHeight) {
      scrollPos = totalHeight;
      promptText.style.transform = `translateY(-${scrollPos}px)`;
      progressFill.style.width   = '100%';
      running = false;
      document.getElementById('done-overlay').classList.add('visible');
      return;
    }

    promptText.style.transform = `translateY(-${scrollPos}px)`;
    progressFill.style.width   = (scrollPos / totalHeight * 100) + '%';
    raf = requestAnimationFrame(tick);
  }

  function togglePlay() {
    if (running) {
      running = false;
      cancelAnimationFrame(raf);
      playBtn.textContent = '▶ Afspil';
      playBtn.classList.remove('active');
    } else {
      running  = true;
      lastTime = null;
      playBtn.textContent = '⏸ Pause';
      playBtn.classList.add('active');
      raf = requestAnimationFrame(tick);
    }
  }

  function resetPrompter() {
    running = false;
    cancelAnimationFrame(raf);
    document.getElementById('prompter-screen').style.display = 'none';
    document.getElementById('editor-screen').style.display   = 'flex';
    progressFill.style.width = '0%';
    playBtn.textContent = '⏸ Pause';
    playBtn.classList.add('active');
  }

  function changeSpeed(delta) {
    speed = Math.round(Math.min(10, Math.max(0.5, speed + delta)) * 2) / 2;
    barSpeedVal.textContent = speed;
    speedSlider.value       = speed;
    speedVal.textContent    = speed;
  }

  function changeSize(delta) {
    fontSize = Math.min(96, Math.max(16, fontSize + delta));
    promptText.style.fontSize = fontSize + 'px';
    sizeSlider.value = fontSize;
    sizeVal.textContent = fontSize;
    totalHeight = promptText.scrollHeight - scrollContainer.clientHeight;
  }

  function changeWidth(delta) {
    textWidth = Math.min(100, Math.max(20, textWidth + delta));
    promptText.style.width  = textWidth + '%';
    barWidthVal.textContent = textWidth + '%';
    widthSlider.value       = textWidth;
    widthVal.textContent    = textWidth + '%';
    totalHeight = promptText.scrollHeight - scrollContainer.clientHeight;
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  }

  // ── TOUCH GESTURES ────────────────────────────────────
  let touchStartY    = 0;
  let touchStartX    = 0;
  let touchStartSpeed = 0;
  let gestureMode    = null;
  let touchMoved     = false;

  scrollContainer.addEventListener('touchstart', (e) => {
    touchStartY     = e.touches[0].clientY;
    touchStartX     = e.touches[0].clientX;
    touchStartSpeed = speed;
    gestureMode     = null;
    touchMoved      = false;
  }, { passive: true });

  scrollContainer.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const dy = touchStartY - e.touches[0].clientY;
    const dx = Math.abs(e.touches[0].clientX - touchStartX);

    if (Math.abs(dy) > 5 || dx > 5) touchMoved = true;

    if (!gestureMode && touchMoved) {
      gestureMode = Math.abs(dy) > dx ? 'speed' : null;
    }

    if (gestureMode === 'speed') {
      // 60px swipe = 1 speed unit
      const newSpeed = Math.round(Math.min(10, Math.max(0.5, touchStartSpeed + dy / 60)) * 2) / 2;
      if (newSpeed !== speed) {
        speed = newSpeed;
        barSpeedVal.textContent = speed;
        speedSlider.value       = speed;
        speedVal.textContent    = speed;
      }
    }
  }, { passive: false });

  scrollContainer.addEventListener('touchend', (e) => {
    // Short tap = toggle play
    if (!touchMoved) {
      togglePlay();
    }
  }, { passive: true });

  // ── KEYBOARD (desktop) ────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('prompter-screen').style.display === 'none') return;
    if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowUp')    { e.preventDefault(); changeSpeed(+0.5); }
    if (e.code === 'ArrowDown')  { e.preventDefault(); changeSpeed(-0.5); }
    if (e.code === 'ArrowLeft')  { e.preventDefault(); scrollPos = Math.max(0, scrollPos - 200); }
    if (e.code === 'ArrowRight') { e.preventDefault(); scrollPos = Math.min(totalHeight, scrollPos + 200); }
  });
</script>
</body>
</html>
